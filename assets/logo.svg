<svg width="480" height="140" viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2E9968"/>
      <stop offset="0.5" stop-color="#4AF7A0"/>
      <stop offset="1" stop-color="#2E9968"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background rounded panel -->
  <rect x="0" y="0" width="480" height="140" rx="18" fill="#0D1614"/>
  <!-- subtle grid -->
  <g stroke="#1B2A25" stroke-width="1">
    <line x1="0" y1="35" x2="480" y2="35"/>
    <line x1="0" y1="70" x2="480" y2="70"/>
    <line x1="0" y1="105" x2="480" y2="105"/>
  </g>

  <!-- icon: circular monitor with cough waveform -->
  <g transform="translate(70,70)">
    <circle r="46" fill="#131F1C" stroke="#24362F" stroke-width="2"/>
    <!-- waveform: flat -> cough burst -> flat -->
    <path d="M -34 0 L -22 0 L -16 -6 L -10 8 L -4 -26 L 2 30 L 8 -18 L 14 10 L 20 -5 L 26 0 L 34 0"
          fill="none" stroke="url(#sig)" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" filter="url(#glow)"/>
    <!-- small pulse dot -->
    <circle cx="34" cy="0" r="3" fill="#4AF7A0" filter="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <text x="140" y="66" font-family="'Segoe UI', 'Space Grotesk', Arial, sans-serif"
        font-size="42" font-weight="700" fill="#E8F2ED" letter-spacing="-1">Cough<tspan fill="#4AF7A0">Sense</tspan></text>
  <text x="142" y="94" font-family="'Consolas', 'IBM Plex Mono', monospace"
        font-size="14" fill="#7FA396" letter-spacing="2">ACOUSTIC · AI · SCREENING</text>
</svg>
